<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Algebra Balance Scale</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<h1>⚖️ Algebra Balance Scale</h1>
<p class="subtitle">Learn to solve equations by keeping the scale balanced!</p>

<div class="input-bar">
  <input type="text" id="eqInput" placeholder="Enter equation: 3x + 5 = 10x + 12" aria-label="Equation input">
  <button class="btn btn-primary" onclick="loadEquation()">Load</button>
</div>

<div class="presets">
  <button class="btn btn-preset" onclick="loadPreset('easy',this)" data-eq="2x + 3 = x + 7">Easy</button>
  <button class="btn btn-preset" onclick="loadPreset('medium',this)" data-eq="3x + 5 = 10x + 12">Medium</button>
  <button class="btn btn-preset" onclick="loadPreset('hard',this)" data-eq="4x - 8 = -2x + 10">Hard</button>
</div>

<div class="current-eq" id="currentEq"></div>

<!-- Scale area: fills available space, beam sits at the bottom, blocks grow upward -->
<div class="scale-area">
  <div class="scale-wrap">
    <div class="pan-objects pan-left-obj" id="leftObjects"></div>
    <div class="pan-objects pan-right-obj" id="rightObjects"></div>
    <svg class="scale-svg" viewBox="0 0 650 100" preserveAspectRatio="xMidYMax meet" id="scaleSvg">
      <defs>
        <linearGradient id="fulcrumGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#E8C840"/>
          <stop offset="50%" stop-color="#D4A828"/>
          <stop offset="100%" stop-color="#B89020"/>
        </linearGradient>
        <linearGradient id="beamGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#D4A860"/>
          <stop offset="40%" stop-color="#C89848"/>
          <stop offset="100%" stop-color="#A07830"/>
        </linearGradient>
        <linearGradient id="shelfGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#B08040"/>
          <stop offset="100%" stop-color="#8B6530"/>
        </linearGradient>
      </defs>
      <!-- Fulcrum -->
      <polygon points="325,48 290,95 360,95" fill="url(#fulcrumGrad)" stroke="#A08020" stroke-width="2"/>
      <g id="beamGroup" style="transform-origin: 325px 36px;">
        <!-- Wooden beam -->
        <rect x="40" y="28" width="570" height="16" rx="3" fill="url(#beamGrad)" stroke="#8B6530" stroke-width="1.5"/>
        <!-- Wood grain -->
        <line x1="60" y1="33" x2="590" y2="33" stroke="rgba(139,101,48,.3)" stroke-width="0.5"/>
        <line x1="50" y1="38" x2="600" y2="38" stroke="rgba(139,101,48,.3)" stroke-width="0.5"/>
        <!-- Left shelf -->
        <rect x="70" y="18" width="110" height="12" rx="2" fill="url(#shelfGrad)" stroke="#6B4520" stroke-width="1.5"/>
        <!-- Right shelf -->
        <rect x="470" y="18" width="110" height="12" rx="2" fill="url(#shelfGrad)" stroke="#6B4520" stroke-width="1.5"/>
        <!-- Support posts -->
        <rect x="120" y="16" width="8" height="14" rx="1" fill="#9B7540" stroke="#6B4520" stroke-width="1"/>
        <rect x="520" y="16" width="8" height="14" rx="1" fill="#9B7540" stroke="#6B4520" stroke-width="1"/>
      </g>
    </svg>
  </div>
</div>

<div class="controls-row" id="controlsRow">
  <div class="side-controls">
    <div class="side-label">Left Side</div>
    <div class="ctrl-row">
      <button class="ctrl-btn" onclick="modify('l','x',-1)">−</button>
      <div class="ctrl-icon var">x</div>
      <span class="ctrl-count" id="lxCount">0</span>
      <button class="ctrl-btn" onclick="modify('l','x',1)">+</button>
    </div>
    <div class="ctrl-row">
      <button class="ctrl-btn" onclick="modify('l','c',-1)">−</button>
      <div class="ctrl-icon const">1</div>
      <span class="ctrl-count" id="lcCount">0</span>
      <button class="ctrl-btn" onclick="modify('l','c',1)">+</button>
    </div>
  </div>
  <div class="side-controls">
    <div class="side-label">Right Side</div>
    <div class="ctrl-row">
      <button class="ctrl-btn" onclick="modify('r','x',-1)">−</button>
      <div class="ctrl-icon var">x</div>
      <span class="ctrl-count" id="rxCount">0</span>
      <button class="ctrl-btn" onclick="modify('r','x',1)">+</button>
    </div>
    <div class="ctrl-row">
      <button class="ctrl-btn" onclick="modify('r','c',-1)">−</button>
      <div class="ctrl-icon const">1</div>
      <span class="ctrl-count" id="rcCount">0</span>
      <button class="ctrl-btn" onclick="modify('r','c',1)">+</button>
    </div>
  </div>
</div>

<div class="hint-area">
  <label class="hint-toggle"><input type="checkbox" id="hintToggle" checked onchange="updateHint()"> Show Hints</label>
  <div class="hint-msg hidden" id="hintMsg"></div>
</div>

<div class="success-overlay" id="successOverlay">
  <div class="success-card">
    <h2>🎉 You solved it!</h2>
    <div class="solution" id="solutionText"></div>
    <button class="btn btn-primary" onclick="closeSuccess()">Try Another</button>
  </div>
</div>

<script src="engine.js"></script>
<script src="scale.js"></script>
<script src="hints.js"></script>
<script src="solve.js"></script>
<script src="app.js"></script>
</body>
</html>
